name: Java CI/CD Automation Suite with TestNG

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: #manual test

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 3. Run Automation Tests with Maven
        run: mvn test

      - name: 4. Upload Extent Reports as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name:
            extent-execution-report
          path: reports/